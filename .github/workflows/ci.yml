name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Pin Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy --strict)
        run: uv run mypy

      - name: Test (fast path — fakes + heuristic optimizer)
        run: uv run pytest -m "not solver"

      - name: Test (solver path — OR-Tools)
        # Exit code 5 == "no tests collected" (no solver tests exist yet); treat as success.
        run: uv run pytest -m "solver" || [ $? -eq 5 ]

      - name: Test (optional UI — Streamlit)
        run: |
          uv sync --frozen --group ui
          uv run --group ui pytest tests/test_streamlit_app.py
